<!DOCTYPE html>
<html lang="zh-TW">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>中華郵政郵票數位典藏資料庫</title>
<link href="https://fonts.googleapis.com/css2?family=Noto+Serif+TC:wght@300;400;600;700&family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Crimson+Pro:ital,wght@0,300;0,400;1,300&display=swap" rel="stylesheet">
<style>
  :root {
    --cream: #F5F0E8;
    --ivory: #FAF7F2;
    --aged: #E8DFD0;
    --ink: #1C1410;
    --brown: #4A2E1A;
    --sepia: #8B6347;
    --gold: #C9A84C;
    --gold-light: #E8C97A;
    --rust: #9B3A2A;
    --forest: #2C4A3E;
    --shadow: rgba(28, 20, 16, 0.15);
  }
  * { margin: 0; padding: 0; box-sizing: border-box; }
  body {
    background-color: var(--cream);
    color: var(--ink);
    font-family: 'Noto Serif TC', serif;
    min-height: 100vh;
  }

  /* HEADER */
  header {
    background: var(--brown);
    background-image: linear-gradient(135deg, #3A2010 0%, #4A2E1A 40%, #5C3A22 100%);
    padding: 0;
    position: relative;
    overflow: hidden;
    border-bottom: 3px solid var(--gold);
  }
  header::before {
    content: '';
    position: absolute;
    inset: 0;
    background-image:
      repeating-linear-gradient(0deg, transparent, transparent 28px, rgba(201,168,76,0.08) 28px, rgba(201,168,76,0.08) 29px),
      repeating-linear-gradient(90deg, transparent, transparent 28px, rgba(201,168,76,0.08) 28px, rgba(201,168,76,0.08) 29px);
  }
  .header-inner {
    position: relative;
    max-width: 1400px;
    margin: 0 auto;
    padding: 40px 48px 36px;
    display: flex;
    align-items: flex-end;
    justify-content: space-between;
    gap: 24px;
    flex-wrap: wrap;
  }
  .header-eyebrow {
    font-family: 'Crimson Pro', serif;
    font-size: 11px;
    letter-spacing: 4px;
    text-transform: uppercase;
    color: var(--gold-light);
    opacity: 0.8;
    margin-bottom: 8px;
  }
  h1 {
    font-family: 'Playfair Display', serif;
    font-size: clamp(24px, 4vw, 44px);
    font-weight: 700;
    color: var(--cream);
    line-height: 1.15;
  }
  h1 em { font-style: italic; color: var(--gold-light); }
  .header-meta {
    font-family: 'Crimson Pro', serif;
    font-size: 13px;
    color: var(--aged);
    opacity: 0.6;
    margin-top: 10px;
    letter-spacing: 1px;
  }
  .header-stamp-deco { display: flex; gap: 12px; align-items: center; opacity: 0.4; }
  .deco-stamp {
    width: 44px; height: 56px;
    border: 2px solid var(--gold); border-radius: 2px; position: relative;
  }
  .deco-stamp::before {
    content: ''; position: absolute; inset: -6px;
    border: 2px dashed rgba(201,168,76,0.4); border-radius: 3px;
  }

  /* TOOLBAR */
  .toolbar {
    background: var(--ivory);
    border-bottom: 1px solid var(--aged);
    padding: 16px 0;
    position: sticky; top: 0; z-index: 100;
    box-shadow: 0 2px 12px var(--shadow);
  }
  .toolbar-inner {
    max-width: 1400px; margin: 0 auto; padding: 0 48px;
    display: flex; align-items: center; gap: 20px; flex-wrap: wrap;
  }
  .search-wrap { flex: 1; min-width: 200px; max-width: 340px; position: relative; }
  .search-wrap input {
    width: 100%; padding: 10px 16px 10px 42px;
    border: 1.5px solid var(--aged); border-radius: 2px;
    background: var(--cream); font-family: 'Noto Serif TC', serif;
    font-size: 13px; color: var(--ink); outline: none;
    transition: border-color .2s, box-shadow .2s;
  }
  .search-wrap input:focus { border-color: var(--gold); box-shadow: 0 0 0 3px rgba(201,168,76,.15); }
  .search-wrap input::placeholder { color: var(--sepia); opacity: .5; }
  .search-icon { position: absolute; left: 14px; top: 50%; transform: translateY(-50%); color: var(--sepia); opacity: .5; font-size: 14px; }
  .filter-group { display: flex; gap: 8px; flex-wrap: wrap; }
  .filter-btn {
    padding: 8px 14px; border: 1.5px solid var(--aged); background: transparent;
    font-family: 'Noto Serif TC', serif; font-size: 12px; color: var(--sepia);
    cursor: pointer; border-radius: 2px; letter-spacing: .5px; transition: all .2s;
  }
  .filter-btn:hover { border-color: var(--gold); color: var(--brown); }
  .filter-btn.active { background: var(--brown); border-color: var(--brown); color: var(--cream); }
  .count-tag { margin-left: auto; font-family: 'Crimson Pro', serif; font-size: 13px; color: var(--sepia); white-space: nowrap; }

  /* GRID */
  .gallery-wrap { max-width: 1400px; margin: 0 auto; padding: 48px 48px 80px; }
  .stamps-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(220px, 1fr)); gap: 32px; }
  .stamp-card { cursor: pointer; animation: fadeUp .5s ease backwards; }
  @keyframes fadeUp { from { opacity: 0; transform: translateY(20px); } to { opacity: 1; transform: translateY(0); } }
  .stamp-frame {
    background: var(--ivory); border: 1px solid var(--aged);
    box-shadow: 2px 3px 12px var(--shadow), 0 0 0 1px rgba(255,255,255,.5) inset;
    position: relative; padding: 14px;
    transition: transform .3s ease, box-shadow .3s ease;
  }
  .stamp-frame::before {
    content: ''; position: absolute; top: -5px; left: -5px; right: -5px; bottom: -5px;
    background:
      radial-gradient(circle at 50% 0%, var(--cream) 5px, transparent 5px),
      radial-gradient(circle at 50% 100%, var(--cream) 5px, transparent 5px),
      radial-gradient(circle at 0% 50%, var(--cream) 5px, transparent 5px),
      radial-gradient(circle at 100% 50%, var(--cream) 5px, transparent 5px);
    background-repeat: repeat-x, repeat-x, repeat-y, repeat-y;
    background-size: 14px 10px, 14px 10px, 10px 14px, 10px 14px;
    pointer-events: none; z-index: 1;
  }
  .stamp-card:hover .stamp-frame { transform: translateY(-4px) rotate(.5deg); box-shadow: 6px 12px 28px rgba(28,20,16,.2), 0 0 0 1px rgba(255,255,255,.5) inset; }
  .stamp-img-wrap { width: 100%; aspect-ratio: 1/1.15; overflow: hidden; background: var(--aged); position: relative; display: flex; align-items: center; justify-content: center; }
  .stamp-img-wrap img { width: 100%; height: 100%; object-fit: cover; display: block; transition: transform .4s ease; filter: sepia(5%) contrast(1.05); }
  .stamp-card:hover .stamp-img-wrap img { transform: scale(1.04); }
  /* Placeholder when no image */
  .stamp-placeholder {
    width: 100%; height: 100%;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #e8dfd0, #d4c9b8);
    color: var(--sepia); gap: 10px;
  }
  .stamp-placeholder .ph-icon { font-size: 36px; opacity: .4; }
  .stamp-placeholder .ph-text { font-family: 'Crimson Pro', serif; font-size: 11px; letter-spacing: 1px; opacity: .5; text-align: center; padding: 0 8px; }
  .stamp-postmark {
    position: absolute; top: 8px; right: 8px;
    width: 46px; height: 46px;
    border: 2px solid rgba(155,58,42,.55); border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-family: 'Crimson Pro', serif; font-size: 8px;
    color: rgba(155,58,42,.55); text-align: center; line-height: 1.2;
    text-transform: uppercase; letter-spacing: .5px;
    transform: rotate(-15deg); pointer-events: none;
  }
  .stamp-meta { padding: 12px 4px 4px; }
  .stamp-title { font-size: 13px; font-weight: 600; color: var(--ink); line-height: 1.4; margin-bottom: 4px; overflow: hidden; display: -webkit-box; -webkit-line-clamp: 2; -webkit-box-orient: vertical; }
  .stamp-subtitle { font-family: 'Crimson Pro', serif; font-size: 12px; color: var(--sepia); line-height: 1.4; }
  .stamp-tags { display: flex; flex-wrap: wrap; gap: 4px; margin-top: 8px; }
  .stamp-tag { font-family: 'Crimson Pro', serif; font-size: 10px; letter-spacing: .5px; padding: 2px 7px; border: 1px solid var(--aged); color: var(--sepia); border-radius: 1px; }
  .no-results { grid-column: 1/-1; text-align: center; padding: 80px 20px; color: var(--sepia); font-family: 'Crimson Pro', serif; font-size: 18px; opacity: .6; }

  /* LIGHTBOX */
  .lightbox { display: none; position: fixed; inset: 0; z-index: 1000; background: rgba(20,14,10,.88); backdrop-filter: blur(6px); align-items: center; justify-content: center; padding: 24px; }
  .lightbox.open { display: flex; animation: lbFadeIn .3s ease; }
  @keyframes lbFadeIn { from { opacity: 0; } to { opacity: 1; } }
  .lb-panel {
    display: flex; max-width: 980px; width: 100%; max-height: 92vh;
    background: var(--ivory); box-shadow: 0 40px 80px rgba(0,0,0,.5);
    animation: lbSlideUp .3s ease; overflow: hidden;
  }
  @keyframes lbSlideUp { from { transform: translateY(30px); opacity: 0; } to { transform: translateY(0); opacity: 1; } }
  .lb-img-side {
    flex: 0 0 42%; background: var(--aged); position: relative;
    display: flex; align-items: center; justify-content: center; padding: 32px; min-height: 400px;
  }
  .lb-img-side::before { content: ''; position: absolute; inset: 12px; border: 1px dashed rgba(201,168,76,.35); pointer-events: none; }
  .lb-stamp-frame {
    background: var(--ivory); padding: 16px;
    box-shadow: 4px 6px 20px rgba(0,0,0,.25);
    position: relative; max-width: 280px; width: 100%;
  }
  .lb-stamp-frame::before {
    content: ''; position: absolute; top: -6px; left: -6px; right: -6px; bottom: -6px;
    background:
      radial-gradient(circle at 50% 0%, var(--aged) 6px, transparent 6px),
      radial-gradient(circle at 50% 100%, var(--aged) 6px, transparent 6px),
      radial-gradient(circle at 0% 50%, var(--aged) 6px, transparent 6px),
      radial-gradient(circle at 100% 50%, var(--aged) 6px, transparent 6px);
    background-repeat: repeat-x, repeat-x, repeat-y, repeat-y;
    background-size: 16px 12px, 16px 12px, 12px 16px, 12px 16px;
    pointer-events: none;
  }
  .lb-img { width: 100%; display: block; filter: sepia(5%) contrast(1.05); }
  .lb-placeholder-lg {
    width: 100%; aspect-ratio: 1/1;
    display: flex; flex-direction: column; align-items: center; justify-content: center;
    background: linear-gradient(135deg, #e0d5c2, #cfc3ae);
    color: var(--sepia); gap: 12px;
  }
  .lb-placeholder-lg .ph-icon { font-size: 56px; opacity: .3; }
  .lb-placeholder-lg .ph-text { font-family: 'Crimson Pro', serif; font-size: 13px; opacity: .4; }
  .lb-info-side { flex: 1; padding: 36px 32px; overflow-y: auto; display: flex; flex-direction: column; gap: 18px; }
  .lb-catalog-no { font-family: 'Crimson Pro', serif; font-size: 11px; letter-spacing: 3px; text-transform: uppercase; color: var(--gold); }
  .lb-title { font-family: 'Playfair Display', serif; font-size: 22px; font-weight: 700; color: var(--ink); line-height: 1.3; }
  .lb-subtitle { font-family: 'Crimson Pro', serif; font-size: 14px; color: var(--sepia); font-style: italic; }
  .lb-divider { height: 1px; background: linear-gradient(to right, var(--gold), transparent); opacity: .4; }
  .lb-fields { display: grid; grid-template-columns: 1fr 1fr; gap: 14px; }
  .lb-field-label { font-family: 'Crimson Pro', serif; font-size: 10px; letter-spacing: 2px; text-transform: uppercase; color: var(--sepia); opacity: .6; margin-bottom: 3px; }
  .lb-field-value { font-size: 12px; color: var(--ink); line-height: 1.5; }
  .lb-desc { font-family: 'Crimson Pro', serif; font-size: 14px; color: var(--brown); line-height: 1.85; padding: 14px; background: var(--cream); border-left: 2px solid var(--gold); }
  .lb-desc-placeholder { font-family: 'Crimson Pro', serif; font-size: 13px; color: var(--sepia); opacity: .45; font-style: italic; }
  .lb-tag-list { display: flex; flex-wrap: wrap; gap: 6px; }
  .lb-tag { font-family: 'Crimson Pro', serif; font-size: 11px; padding: 3px 10px; border: 1px solid var(--aged); color: var(--sepia); border-radius: 1px; }
  .lb-close { position: absolute; top: 16px; right: 20px; width: 32px; height: 32px; background: none; border: 1px solid rgba(255,255,255,.2); color: rgba(255,255,255,.7); font-size: 18px; cursor: pointer; display: flex; align-items: center; justify-content: center; border-radius: 2px; transition: all .2s; }
  .lb-close:hover { background: rgba(255,255,255,.1); color: #fff; }
  .lb-nav { display: flex; gap: 8px; margin-top: auto; padding-top: 16px; }
  .lb-nav-btn { flex: 1; padding: 10px; border: 1.5px solid var(--aged); background: transparent; font-family: 'Noto Serif TC', serif; font-size: 12px; color: var(--sepia); cursor: pointer; border-radius: 2px; transition: all .2s; }
  .lb-nav-btn:hover { background: var(--brown); color: var(--cream); border-color: var(--brown); }

  /* DC fields table */
  .dc-table { width: 100%; border-collapse: collapse; font-size: 12px; }
  .dc-table td { padding: 6px 8px; border-bottom: 1px solid var(--aged); vertical-align: top; line-height: 1.5; }
  .dc-table td:first-child { font-family: 'Crimson Pro', serif; color: var(--sepia); width: 36%; font-size: 11px; letter-spacing: .5px; }

  @media (max-width: 768px) {
    .header-inner, .toolbar-inner, .gallery-wrap { padding-left: 16px; padding-right: 16px; }
    .lb-panel { flex-direction: column; max-height: 95vh; }
    .lb-img-side { flex: 0 0 180px; min-height: unset; padding: 20px; }
    .lb-info-side { padding: 20px 16px; }
    .lb-fields { grid-template-columns: 1fr; }
    .stamps-grid { grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 18px; }
  }
</style>
</head>
<body>

<header>
  <div class="header-inner">
    <div>
      <div class="header-eyebrow">Digital Archive · 數位典藏 · 民國100年</div>
      <h1>中華郵政<em>郵票典藏</em></h1>
      <div class="header-meta">Chunghwa Post Co., Ltd. · Republic of China · 建國百年系列</div>
    </div>
    <div class="header-stamp-deco">
      <div class="deco-stamp"></div>
      <div class="deco-stamp" style="height:48px;width:38px;opacity:.6"></div>
      <div class="deco-stamp" style="height:60px;opacity:.4"></div>
    </div>
  </div>
</header>

<div class="toolbar">
  <div class="toolbar-inner">
    <div class="search-wrap">
      <span class="search-icon">⌕</span>
      <input type="text" id="searchInput" placeholder="搜尋郵票名稱、主題、設計者…" oninput="filterStamps()">
    </div>
    <div class="filter-group" id="filterGroup">
      <button class="filter-btn active" onclick="setFilter('全部',this)">全部</button>
      <button class="filter-btn" onclick="setFilter('自然',this)">自然</button>
      <button class="filter-btn" onclick="setFilter('文化',this)">文化</button>
      <button class="filter-btn" onclick="setFilter('建築',this)">建築</button>
      <button class="filter-btn" onclick="setFilter('動物',this)">動物</button>
      <button class="filter-btn" onclick="setFilter('歷史',this)">歷史</button>
      <button class="filter-btn" onclick="setFilter('節慶',this)">節慶</button>
    </div>
    <div class="count-tag" id="countTag">共 <strong>0</strong> 枚</div>
  </div>
</div>

<main class="gallery-wrap">
  <div class="stamps-grid" id="stampsGrid"></div>
</main>

<!-- LIGHTBOX -->
<div class="lightbox" id="lightbox" onclick="closeLbBg(event)">
  <button class="lb-close" onclick="closeLightbox()">✕</button>
  <div class="lb-panel">
    <div class="lb-img-side">

    </div>
    <div class="lb-info-side">
      <div class="lb-catalog-no" id="lbCatalog"></div>
      <div class="lb-title" id="lbTitle"></div>
      <div class="lb-subtitle" id="lbSubtitle"></div>
      <div class="lb-divider"></div>
      <table class="dc-table" id="lbTable"></table>
      <div class="lb-desc" id="lbDesc"></div>
      <div>
        <div class="lb-field-label" style="margin-bottom:8px">主題標籤</div>
        <div class="lb-tag-list" id="lbTags"></div>
      </div>
      <div class="lb-nav">
        <button class="lb-nav-btn" onclick="navigateLb(-1)">← 上一枚</button>
        <button class="lb-nav-btn" onclick="navigateLb(1)">下一枚 →</button>
      </div>
    </div>
  </div>
</div>

// ── STATE ──────────────────────────────────────────────────────────────────
let currentFilter = '全部', currentSearch = '', currentIndex = 0, filtered = [];

// ── RENDER ─────────────────────────────────────────────────────────────────
function getFiltered() {
  return stamps.filter(s => {
    const mc = currentFilter === '全部' || s.category === currentFilter;
    const q = currentSearch.toLowerCase();
    const ms = !q || s.title.includes(q) || s.creator.includes(q) ||
      s.subject.some(t => t.includes(q)) || s.coverage.includes(q) || s.date.includes(q);
    return mc && ms;
  });
}

function renderGrid() {
  filtered = getFiltered();
  const grid = document.getElementById('stampsGrid');
  document.getElementById('countTag').innerHTML = `共 <strong>${filtered.length}</strong> 枚`;
  if (!filtered.length) { grid.innerHTML = '<div class="no-results">未找到符合條件的郵票</div>'; return; }
  grid.innerHTML = filtered.map((s, i) => `
    <div class="stamp-card" style="animation-delay:${i*.04}s" onclick="openLightbox(${stamps.indexOf(s)})">
      <div class="stamp-frame">
        <div class="stamp-img-wrap">
          <img src="${s.img}" alt="${s.title}" loading="lazy" onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
          <div class="stamp-placeholder" style="display:none">
            <div class="ph-icon">✉</div>
            <div class="ph-text">${s.title}</div>
          </div>
          <div class="stamp-postmark">${s.date.replace('民國','').replace('年','').split(/[月日]/)[0]}<br>R.O.C.</div>
        </div>
      </div>
      <div class="stamp-meta">
        <div class="stamp-title">${s.title}</div>
        <div class="stamp-subtitle">${s.creator} · ${s.date.replace('民國','').replace('年','年')}</div>
        <div class="stamp-tags">${s.subject.slice(0,3).map(t=>`<span class="stamp-tag">${t}</span>`).join('')}</div>
      </div>
    </div>
  `).join('');
}

function setFilter(cat, btn) {
  currentFilter = cat;
  document.querySelectorAll('.filter-btn').forEach(b => b.classList.remove('active'));
  btn.classList.add('active');
  renderGrid();
}
function filterStamps() { currentSearch = document.getElementById('searchInput').value; renderGrid(); }

// ── LIGHTBOX ───────────────────────────────────────────────────────────────
function openLightbox(idx) {
  currentIndex = idx;
  populateLb(stamps[idx]);
  document.getElementById('lightbox').classList.add('open');
  document.body.style.overflow = 'hidden';
}

function populateLb(s) {
  // Image
  const wrap = document.getElementById('lbImgWrap');
  wrap.innerHTML = `<img class="lb-img" src="${s.img}" alt="${s.title}"
    onerror="this.style.display='none';this.nextElementSibling.style.display='flex'">
    <div class="lb-placeholder-lg" style="display:none">
      <div class="ph-icon">✉</div><div class="ph-text">${s.title}</div>
    </div>`;

  document.getElementById('lbCatalog').textContent = `No. ${String(s.no).padStart(2,'0')} · 民國100年`;
  document.getElementById('lbTitle').textContent = s.title;
  document.getElementById('lbSubtitle').textContent = s.creator;
  document.getElementById('lbDesc').innerHTML = s.desc
    ? s.desc
    : `<span class="lb-desc-placeholder">本郵票暫無詳細說明</span>`;

  const fields = [
    ['發行日期', s.date], ['數位化', s.digitized],
    ['發行機構', s.publisher], ['承印者', s.contributor],
    ['語言', s.language], ['地理範圍', s.coverage],
    ['檔案規格', s.format], ['資源類型', 'Image · StillImage'],
  ];
  document.getElementById('lbTable').innerHTML = fields.map(([k,v])=>`
    <tr><td>${k}</td><td>${v}</td></tr>
  `).join('');

  document.getElementById('lbTags').innerHTML = s.subject.map(t=>`<span class="lb-tag">${t}</span>`).join('');
}

function closeLightbox() { document.getElementById('lightbox').classList.remove('open'); document.body.style.overflow=''; }
function closeLbBg(e) { if (e.target===document.getElementById('lightbox')) closeLightbox(); }
function navigateLb(d) { currentIndex=(currentIndex+d+stamps.length)%stamps.length; populateLb(stamps[currentIndex]); }
document.addEventListener('keydown', e => {
  if (!document.getElementById('lightbox').classList.contains('open')) return;
  if (e.key==='Escape') closeLightbox();
  if (e.key==='ArrowLeft') navigateLb(-1);
  if (e.key==='ArrowRight') navigateLb(1);
});

renderGrid();
</script>
